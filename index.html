<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Physics Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-box">
    <h1>Hành trình Vật Lý</h1>

    <p id="progress">Bản đồ</p>
    <p id="exp">EXP: 0 | Lượt trả lời: 2</p>

    <div id="map"></div>

    <h2 id="question">Chọn khu vực trên bản đồ</h2>

    <div id="answers"></div>

    <p id="result"></p>

    <button id="nextBtn" style="display:none;">Câu tiếp theo</button>

    <h3>Túi đồ</h3>
    <ul id="inventory"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
