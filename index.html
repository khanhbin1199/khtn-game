<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hành trình Vật Lý</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-box">

    <h1>Hành trình Vật Lý</h1>

    <div id="progress">Bản đồ</div>

    <div id="exp">
      Lv 1 | EXP: 0 | Cấp: 0/100 | Lượt trả lời: 2
    </div>

    <div class="map-wrapper">
      <div id="map"></div>
    </div>

    <h2 id="question">Chọn khu vực trên bản đồ</h2>

    <div id="answers"></div>

    <div id="result"></div>

    <button id="nextBtn" style="display:none;">
      Câu tiếp theo
    </button>

    <h2>Túi đồ</h2>

    <ul id="inventory"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
